<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Ide Menu Masakan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Animasi loading sederhana */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid currentColor;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Menghilangkan panah default pada detail summary */
        details > summary {
            list-style: none;
        }
        details > summary::-webkit-details-marker {
            display: none;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

    <header class="bg-indigo-600 text-white p-4 shadow-md sticky top-0 z-10">
        <div class="max-w-7xl mx-auto flex items-center justify-between">

                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                </svg>
                Ide Menu Masakan (AI Powered)

        </div>

                                <div class="text-center p-3 rounded-xl border border-slate-200 peer-checked:border-green-600 peer-checked:bg-green-50 peer-checked:text-green-700 hover:bg-slate-50 transition">Indonesia</div>
                            </label>
                            <label class="cursor-pointer">
                                <input type="radio" name="gayaSayur" value="Chinese" class="peer sr-only">
                                <div class="text-center p-3 rounded-xl border border-slate-200 peer-checked:border-green-600 peer-checked:bg-green-50 peer-checked:text-green-700 hover:bg-slate-50 transition">Chinese</div>
                            </label>
                            <label class="cursor-pointer">

    <script>
        // --- DATA BUMBU & REMPAH ---
        const masterBumbu = {
            "Bumbu Dasar": ["Bawang Merah", "Bawang Putih", "Cabai Rawit", "Cabai Rawit Hijau", "Cabe Merah Keriting"],
            "Rimpang": ["Jahe", "Kunyit", "Lengkuas", "Kencur", "Temu Kunci", "Temulawak"],
            "Daun Aromatik": ["Daun Salam", "Daun Jeruk", "Sereh", "Daun Kunyit", "Daun Bawang", "Selederi", "Kemangi", "Pandan", "Daun Kari"],
            "Rempah": ["Ketumbar", "Kemiri", "Lada", "Pala", "Cengkeh", "Jinten", "Kapulaga", "Bunga Lawang"],
            "Penyedap": ["Gula", "Garam", "Gula Merah", "Asam Jawa", "Terasi", "Jeruk Nipis", "Jeruk Limau", "Mecin"]
        };

        document.addEventListener('DOMContentLoaded', () => {
            renderBumbuList('containerBumbuLauk', 'cb-bumbu-lauk', 'indigo');
            renderBumbuList('containerBumbuSayur', 'cb-bumbu-sayur', 'green');
        });

        function renderBumbuList(containerId, inputClass, accentColor) {
            const container = document.getElementById(containerId);
            let html = '';
            for (const [kategori, items] of Object.entries(masterBumbu)) {
                html += `
                <div class="mb-4 last:mb-0">
                    <h4 class="font-semibold text-slate-700 mb-2 border-b border-slate-200 pb-1">${kategori}</h4>
                    <div class="grid grid-cols-3 gap-2">
                        ${items.map(item => `
                            <label class="flex items-center gap-1.5 cursor-pointer hover:bg-slate-100 p-1 rounded transition">
                                <input type="checkbox" value="${item}" class="${inputClass} w-3.5 h-3.5 text-${accentColor}-600 rounded border-slate-300 focus:ring-${accentColor}-500" checked>
                                <span class="truncate text-slate-600" title="${item}">${item}</span>
                            </label>
                        `).join('')}
                    </div>
                </div>`;
            }
            container.innerHTML = html;
        }

        const apiKey = ""; // Disediakan oleh environment runtime
        const modelEndpoint = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent";

        // Fungsi fetch API Gemini - Disesuaikan untuk generate format UI yang spesifik
        async function fetchGeminiAI(promptText, tipe) {
            const url = `${modelEndpoint}?key=${apiKey}`;
            const accent = tipe === 'lauk' ? 'indigo' : 'green';
            
            // Format instruksi super spesifik agar AI mengembalikan komponen HTML yang rapi
            const systemInst = `Anda adalah asisten koki cerdas. Berikan TEPAT 10 ide masakan. 
Jawablah LANGSUNG dalam format HTML murni (tanpa blok markdown \`\`\`html) dengan struktur INI untuk setiap menu (jangan diubah strukturnya):

<div class="mb-4 bg-white border border-${accent}-200 rounded-xl p-4 shadow-sm">
    <h3 class="font-bold text-${accent}-800 text-lg">1. [Nama Menu]</h3>

            const payload = {
                contents: [{ parts: [{ text: promptText }] }],
                systemInstruction: { parts: [{ text: systemInst }] }
            };

            const maxRetries = 5;
            const delays = [1000, 2000, 4000, 8000, 16000];

            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    
                    const data = await response.json();
                    return data.candidates[0].content.parts[0].text;
                } catch (error) {
                    if (i === maxRetries - 1) {
                        console.error("Gagal menghubungi AI:", error);
                        return "<div class='text-rose-600 font-semibold'>Gagal mendapatkan rekomendasi. Silakan coba lagi nanti.</div>";
                    }
                    await new Promise(resolve => setTimeout(resolve, delays[i]));
                }
            }
        }

        async function generateMenu(tipe) {
            let btnId, btnTextId, resultId, promptText;
            
            if (tipe === 'lauk') {
                const bahanUtamaSelect = document.getElementById('bahanDasarUtama').value;
                let bahan = bahanUtamaSelect;
                if (bahanUtamaSelect === 'lainnya') bahan = document.getElementById('bahanDasarLainnyaUtama').value;
                
                if (!bahan || bahan.trim() === '') {
                    alert("Mohon pilih atau ketik bahan dasar Lauk terlebih dahulu!");
                    return;
                }
                
                const subOpsi = document.getElementById('subOpsiUtama').value;
                if (subOpsi) bahan += ` (potongan/jenis: ${subOpsi})`;

                const gaya = document.querySelector('input[name="gayaUtama"]:checked')?.value || 'Bebas/Campur';
                const prioritas = Array.from(document.querySelectorAll('[id^="prioritasUtama-"]:checked')).map(el => el.value).join(', ') || 'Bebas';
                const hindari = Array.from(document.querySelectorAll('[id^="hindariUtama-"]:checked')).map(el => el.value).join(', ') || 'Tidak ada';
                const tanpaBahan = Array.from(document.querySelectorAll('.cb-bumbu-lauk:not(:checked)')).map(el => el.value).join(', ') || 'Tidak ada (Semua bumbu tersedia)';

                promptText = `Tolong berikan TEPAT 10 ide resep LAUK UTAMA dengan kriteria:\n- Bahan dasar: ${bahan}\n- Gaya: ${gaya}\n- Wajib dimasak dengan cara: ${prioritas}\n- Pantangan masak (JANGAN DILAKUKAN): ${hindari}\n- JANGAN GUNAKAN bumbu/bahan ini: ${tanpaBahan}.`;
                
                btnId = 'btnLauk'; btnTextId = 'btnTextLauk'; resultId = 'resultLauk';
            } 
            else if (tipe === 'sayur') {
                const bahanSayur = document.getElementById('bahanDasarSayur').value;
                if (!bahanSayur || bahanSayur.trim() === '') {
                    alert("Mohon ketik jenis sayuran utama terlebih dahulu!");
                    return;
                }

                const gaya = document.querySelector('input[name="gayaSayur"]:checked')?.value || 'Bebas/Campur';
                const prioritas = Array.from(document.querySelectorAll('[id^="prioritasSayur-"]:checked')).map(el => el.value).join(', ') || 'Bebas';
                const hindari = Array.from(document.querySelectorAll('[id^="hindariSayur-"]:checked')).map(el => el.value).join(', ') || 'Tidak ada';
                const tanpaBahan = Array.from(document.querySelectorAll('.cb-bumbu-sayur:not(:checked)')).map(el => el.value).join(', ') || 'Tidak ada (Semua bumbu tersedia)';

                promptText = `Tolong berikan TEPAT 10 ide resep SAYUR / PENDAMPING dengan kriteria:\n- Sayur utama: ${bahanSayur}\n- Gaya: ${gaya}\n- Wajib dimasak dengan cara: ${prioritas}\n- Pantangan masak (JANGAN DILAKUKAN): ${hindari}\n- JANGAN GUNAKAN bumbu/bahan ini: ${tanpaBahan}.`;
                
                btnId = 'btnSayur'; btnTextId = 'btnTextSayur'; resultId = 'resultSayur';
            }

            const btn = document.getElementById(btnId);
            const btnText = document.getElementById(btnTextId);
            const resultBox = document.getElementById(resultId);
            const originalText = btnText.innerText;

            btn.disabled = true;
            btn.classList.add('opacity-75', 'cursor-not-allowed');
            btnText.innerHTML = `<span class="loader"></span> Menyusun 10 Resep AI...`;
            resultBox.classList.add('hidden');

            // Panggil AI dan lemparkan tipe agar warna UI sesuai (Lauk = Indigo, Sayur = Green)
            const aiResponseHtml = await fetchGeminiAI(promptText, tipe);

            resultBox.innerHTML = `<div class="font-bold text-lg mb-4 pb-2 border-b ${tipe === 'lauk' ? 'border-indigo-200 text-indigo-800' : 'border-green-200 text-green-800'}">🎉 10 Pilihan Menu Berhasil Dibuat:</div>` + aiResponseHtml;
            resultBox.classList.remove('hidden');

            btn.disabled = false;
            btn.classList.remove('opacity-75', 'cursor-not-allowed');
            btnText.innerText = originalText;
        }

        function updateSubOpsiUtama() {
            const select = document.getElementById('bahanDasarUtama');
            const nilai = select.value;
            const containerSubOpsi = document.getElementById('containerSubOpsiUtama');
            const inputSubOpsi = document.getElementById('subOpsiUtama');
            const labelSubOpsi = document.getElementById('labelSubOpsiUtama');
            const hintSubOpsi = document.getElementById('hintSubOpsiUtama');
            const inputLainnya = document.getElementById('bahanDasarLainnyaUtama');

            containerSubOpsi.classList.add('hidden');
            inputLainnya.classList.add('hidden');
            inputSubOpsi.value = '';

            if (nilai === 'ikan') {
                containerSubOpsi.classList.remove('hidden');
                labelSubOpsi.textContent = 'Jenis Ikan';
                inputSubOpsi.placeholder = 'Ketik jenis ikan...';
                hintSubOpsi.textContent = 'Contoh: Ikan Bandeng, Lele, Nila, Salmon';
            } else if (nilai === 'ayam') {
                containerSubOpsi.classList.remove('hidden');
                labelSubOpsi.textContent = 'Potongan Ayam';
                inputSubOpsi.placeholder = 'Ketik potongan ayam...';
                hintSubOpsi.textContent = 'Contoh: Paha Fillet, Dada Mentok, Sayap, Utuh';
            } else if (nilai === 'daging') {
                containerSubOpsi.classList.remove('hidden');
                labelSubOpsi.textContent = 'Bagian/Potongan Daging';
                inputSubOpsi.placeholder = 'Ketik bagian daging...';
                hintSubOpsi.textContent = 'Contoh: Daging Sengkel, Sirloin, Iga, Cincang';
            } else if (nilai === 'lainnya') {
                inputLainnya.classList.remove('hidden');
                inputLainnya.focus();
            }
        }

        function handleConflictUtama(metode) {
            const cbPrioritas = document.getElementById(`prioritasUtama-${metode}`);
            const cbHindari = document.getElementById(`hindariUtama-${metode}`);
            
            cbHindari.disabled = cbPrioritas.checked;
            cbPrioritas.disabled = cbHindari.checked;
        }

        function handleConflictSayur(metode) {
            const cbPrioritas = document.getElementById(`prioritasSayur-${metode}`);
            const cbHindari = document.getElementById(`hindariSayur-${metode}`);
            
            cbHindari.disabled = cbPrioritas.checked;
            cbPrioritas.disabled = cbHindari.checked;
        }
    </script>
